<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 200" width="480" height="200">
  <defs>
    <filter id="neon-pink" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur1"/>
      <feGaussianBlur stdDeviation="8" result="blur2"/>
      <feGaussianBlur stdDeviation="16" result="blur3"/>
      <feMerge>
        <feMergeNode in="blur3"/>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="neon-glow-lg" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="10" result="blur1"/>
      <feGaussianBlur stdDeviation="20" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Outer border frame with neon glow -->
  <rect x="10" y="10" width="460" height="180" rx="12" fill="none" stroke="#e2007a" stroke-width="2" filter="url(#neon-glow-lg)" opacity="0.7"/>
  <rect x="10" y="10" width="460" height="180" rx="12" fill="none" stroke="#ff66bb" stroke-width="1"/>
  <!-- Inner frame -->
  <rect x="20" y="20" width="440" height="160" rx="8" fill="none" stroke="#e2007a" stroke-width="1" opacity="0.4"/>
  <!-- AGENTIC text -->
  <text
    x="240"
    y="95"
    text-anchor="middle"
    font-family="'Arial Black', 'Impact', sans-serif"
    font-weight="900"
    font-size="68"
    letter-spacing="8"
    fill="#ff66c4"
    filter="url(#neon-pink)"
  >AGENTIC</text>
  <!-- SCHOOLED text -->
  <text
    x="240"
    y="158"
    text-anchor="middle"
    font-family="'Arial Black', 'Impact', sans-serif"
    font-weight="900"
    font-size="52"
    letter-spacing="12"
    fill="#ff66c4"
    filter="url(#neon-pink)"
  >SCHOOLED</text>
  <!-- Corner brackets decorative -->
  <path d="M30 30 L30 50 M30 30 L50 30" stroke="#e2007a" stroke-width="2" fill="none" opacity="0.6"/>
  <path d="M450 30 L450 50 M450 30 L430 30" stroke="#e2007a" stroke-width="2" fill="none" opacity="0.6"/>
  <path d="M30 170 L30 150 M30 170 L50 170" stroke="#e2007a" stroke-width="2" fill="none" opacity="0.6"/>
  <path d="M450 170 L450 150 M450 170 L430 170" stroke="#e2007a" stroke-width="2" fill="none" opacity="0.6"/>
</svg>
