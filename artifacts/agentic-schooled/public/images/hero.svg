<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320" width="800" height="320">
  <rect width="800" height="320" fill="#13161e" rx="8"/>
  <!-- Grid lines -->
  <g stroke="#1e2330" stroke-width="1" opacity="0.6">
    <line x1="0" y1="64" x2="800" y2="64"/>
    <line x1="0" y1="128" x2="800" y2="128"/>
    <line x1="0" y1="192" x2="800" y2="192"/>
    <line x1="0" y1="256" x2="800" y2="256"/>
    <line x1="160" y1="0" x2="160" y2="320"/>
    <line x1="320" y1="0" x2="320" y2="320"/>
    <line x1="480" y1="0" x2="480" y2="320"/>
    <line x1="640" y1="0" x2="640" y2="320"/>
  </g>
  <!-- Agent nodes -->
  <circle cx="160" cy="160" r="36" fill="#0d0f14" stroke="#7c6af7" stroke-width="2"/>
  <text x="160" y="155" text-anchor="middle" fill="#7c6af7" font-size="11" font-family="monospace">GOAL</text>
  <text x="160" y="170" text-anchor="middle" fill="#7c6af7" font-size="11" font-family="monospace">INPUT</text>
  <circle cx="400" cy="160" r="44" fill="#0d0f14" stroke="#7c6af7" stroke-width="2.5"/>
  <text x="400" y="153" text-anchor="middle" fill="#a89df8" font-size="12" font-family="monospace" font-weight="bold">AGENT</text>
  <text x="400" y="170" text-anchor="middle" fill="#7c6af7" font-size="10" font-family="monospace">think → act</text>
  <circle cx="640" cy="120" r="28" fill="#0d0f14" stroke="#4b3fd4" stroke-width="1.5"/>
  <text x="640" y="124" text-anchor="middle" fill="#7c6af7" font-size="10" font-family="monospace">TOOLS</text>
  <circle cx="640" cy="200" r="28" fill="#0d0f14" stroke="#4b3fd4" stroke-width="1.5"/>
  <text x="640" y="204" text-anchor="middle" fill="#7c6af7" font-size="10" font-family="monospace">OUTPUT</text>
  <!-- Arrows -->
  <line x1="196" y1="160" x2="352" y2="160" stroke="#7c6af7" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="444" y1="144" x2="610" y2="125" stroke="#4b3fd4" stroke-width="1.5" stroke-dasharray="4 3"/>
  <line x1="444" y1="174" x2="610" y2="196" stroke="#4b3fd4" stroke-width="1.5" stroke-dasharray="4 3"/>
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#7c6af7"/>
    </marker>
  </defs>
  <!-- Label -->
  <text x="400" y="290" text-anchor="middle" fill="#7a7f94" font-size="13" font-family="monospace">Goal → Reason → Act → Observe → Repeat</text>
</svg>
