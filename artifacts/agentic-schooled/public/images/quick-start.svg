<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 280" width="800" height="280">
  <rect width="800" height="280" fill="#13161e" rx="8"/>
  <!-- Input box -->
  <rect x="40" y="60" width="300" height="90" rx="6" fill="#0d0f14" stroke="#7c6af7" stroke-width="1.5"/>
  <text x="55" y="85" fill="#7a7f94" font-family="monospace" font-size="11">Your business idea...</text>
  <text x="55" y="108" fill="#e2e4ec" font-family="monospace" font-size="10">I want to build a tool that helps</text>
  <text x="55" y="124" fill="#e2e4ec" font-family="monospace" font-size="10">restaurant owners manage social...</text>
  <text x="55" y="140" fill="#7c6af7" font-family="monospace" font-size="10">▌</text>
  <!-- Arrow -->
  <path d="M 345 105 L 395 105" stroke="#7c6af7" stroke-width="2" marker-end="url(#arr2)"/>
  <defs>
    <marker id="arr2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#7c6af7"/>
    </marker>
  </defs>
  <!-- Agent thinking -->
  <rect x="400" y="50" width="130" height="110" rx="6" fill="#0d0f14" stroke="#4b3fd4" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="465" y="80" text-anchor="middle" fill="#a89df8" font-family="monospace" font-size="11" font-weight="bold">AGENT</text>
  <text x="465" y="100" text-anchor="middle" fill="#7a7f94" font-family="monospace" font-size="10">analyzing...</text>
  <text x="465" y="116" text-anchor="middle" fill="#7a7f94" font-family="monospace" font-size="10">reasoning...</text>
  <text x="465" y="132" text-anchor="middle" fill="#7a7f94" font-family="monospace" font-size="10">structuring...</text>
  <!-- Output -->
  <rect x="545" y="30" width="215" height="200" rx="6" fill="#0d0f14" stroke="#7c6af7" stroke-width="1.5"/>
  <text x="560" y="55" fill="#a89df8" font-family="monospace" font-size="11" font-weight="bold">Analysis</text>
  <text x="560" y="78" fill="#7a7f94" font-family="monospace" font-size="10">① The customer</text>
  <text x="560" y="98" fill="#7a7f94" font-family="monospace" font-size="10">② The wedge</text>
  <text x="560" y="118" fill="#7a7f94" font-family="monospace" font-size="10">③ Unit economics</text>
  <text x="560" y="138" fill="#7a7f94" font-family="monospace" font-size="10">④ What kills it</text>
  <text x="560" y="158" fill="#7a7f94" font-family="monospace" font-size="10">⑤ What to test</text>
  <text x="400" y="265" text-anchor="middle" fill="#7a7f94" font-size="12" font-family="monospace">Paste your idea. Get honest feedback.</text>
</svg>
